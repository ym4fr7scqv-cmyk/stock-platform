# railway.toml — Web Service (FastAPI)
# الخدمة الرئيسية: تُنشأ تلقائياً عند ربط الـ repo بـ Railway
# خدمة الـ Cron تُنشأ يدوياً في Railway Dashboard (انظر DEPLOYMENT.md)

[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
